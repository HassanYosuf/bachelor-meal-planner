<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a18" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Bachelor Meal Planner</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg" />
  <link rel="apple-touch-icon" href="logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Auth Screen -->
  <div class="auth-screen" id="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <svg width="72" height="72" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="200" height="200" rx="52" fill="#d4700a"/>
          <line x1="68" y1="46" x2="68" y2="84" stroke="white" stroke-width="9" stroke-linecap="round"/>
          <line x1="83" y1="46" x2="83" y2="84" stroke="white" stroke-width="9" stroke-linecap="round"/>
          <line x1="98" y1="46" x2="98" y2="84" stroke="white" stroke-width="9" stroke-linecap="round"/>
          <path d="M68 84 Q68 106 83 108 Q98 106 98 84" stroke="white" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="83" y1="108" x2="83" y2="158" stroke="white" stroke-width="10" stroke-linecap="round"/>
          <ellipse cx="132" cy="77" rx="21" ry="30" stroke="white" stroke-width="9" fill="none"/>
          <line x1="132" y1="107" x2="132" y2="158" stroke="white" stroke-width="10" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="auth-title">Meal Planner</h1>
      <p class="auth-sub">Bachelor's kitchen</p>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-signin" onclick="switchAuthTab('signin')">Sign in</button>
        <button class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">Sign up</button>
      </div>

      <div id="signup-name-row" style="display:none">
        <input class="auth-input" id="auth-name" type="text" placeholder="Your name" autocomplete="name" />
      </div>
      <input class="auth-input" id="auth-email" type="email" placeholder="Email" autocomplete="email" />
      <input class="auth-input" id="auth-password" type="password" placeholder="Password" autocomplete="current-password" />
      <p class="auth-error" id="auth-error"></p>
      <button class="auth-btn" id="auth-submit-btn" onclick="submitAuth()">Sign in</button>
    </div>
  </div>

  <!-- App Shell -->
  <div class="app" id="app" style="display:none">

    <!-- Header -->
    <header class="header">
      <div class="header-top">
        <div class="header-brand">
          <svg width="32" height="32" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="200" height="200" rx="52" fill="#d4700a"/>
            <line x1="68" y1="46" x2="68" y2="84" stroke="white" stroke-width="9" stroke-linecap="round"/>
            <line x1="83" y1="46" x2="83" y2="84" stroke="white" stroke-width="9" stroke-linecap="round"/>
            <line x1="98" y1="46" x2="98" y2="84" stroke="white" stroke-width="9" stroke-linecap="round"/>
            <path d="M68 84 Q68 106 83 108 Q98 106 98 84" stroke="white" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="83" y1="108" x2="83" y2="158" stroke="white" stroke-width="10" stroke-linecap="round"/>
            <ellipse cx="132" cy="77" rx="21" ry="30" stroke="white" stroke-width="9" fill="none"/>
            <line x1="132" y1="107" x2="132" y2="158" stroke="white" stroke-width="10" stroke-linecap="round"/>
          </svg>
          <div>
            <h1 class="app-name">Meal Planner</h1>
            <p class="app-tagline">Bachelor's kitchen</p>
          </div>
        </div>
        <div class="header-right">
          <div class="date-badge" id="hdr-date"></div>
          <button class="icon-btn" id="history-btn" title="View history">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
          </button>
          <button class="avatar-btn" id="avatar-btn" title="Account" onclick="toggleUserMenu()"></button>
        </div>
      </div>
      <div class="stats-row" id="stats-row">
        <div class="stat-card">
          <span class="stat-val" id="s-meals">0</span>
          <span class="stat-lbl">meals</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-card">
          <span class="stat-val" id="s-cal">0</span>
          <span class="stat-lbl">kcal</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-card">
          <span class="stat-val" id="s-prep">0</span>
          <span class="stat-lbl">prep needed</span>
        </div>
      </div>
    </header>

    <!-- User dropdown -->
    <div class="user-menu" id="user-menu" style="display:none">
      <div class="user-menu-email" id="user-menu-email"></div>
      <button class="user-menu-signout" onclick="signOut()">Sign out</button>
    </div>

    <!-- Scrollable main -->
    <main class="main">

      <!-- TODAY VIEW -->
      <div id="view-today">
        <section class="section add-section">
          <div class="section-label">Plan a meal</div>
          <div class="type-tabs">
            <button class="type-tab active" data-type="breakfast">Breakfast</button>
            <button class="type-tab" data-type="lunch">Lunch</button>
            <button class="type-tab" data-type="dinner">Dinner</button>
            <button class="type-tab" data-type="snack">Snack</button>
          </div>
          <div class="select-wrap">
            <div class="select-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18M3 7h18M3 11h18M3 15h12M3 19h8"/></svg>
            </div>
            <button class="meal-select" id="meal-drop-btn" data-value="" onclick="toggleDropdown('meal-drop')">Choose a meal...</button>
            <div class="select-arrow">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6,9 12,15 18,9"/></svg>
            </div>
            <div class="custom-dropdown" id="meal-drop-list"></div>
          </div>
          <div class="meal-preview" id="meal-preview" style="display:none">
            <div class="preview-icon" id="preview-icon"></div>
            <div class="preview-info">
              <div class="preview-name" id="preview-name"></div>
              <div class="preview-meta" id="preview-meta"></div>
            </div>
            <button class="add-fab" id="add-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add
            </button>
          </div>
          <div class="prep-alert" id="prep-alert" style="display:none">
            <div class="prep-alert-header">
              <div class="prep-pulse"></div>
              <span class="prep-alert-title" id="prep-title">Prep reminder</span>
            </div>
            <p class="prep-msg" id="prep-msg"></p>
            <div class="prep-timer-row">
              <div class="prep-countdown" id="prep-countdown"></div>
              <button class="prep-start-btn" id="prep-start-btn">Start timer</button>
            </div>
          </div>
        </section>

        <div class="notif-bar" id="notif-bar" style="display:none">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>
          <span id="notif-text"></span>
        </div>

        <section class="section log-section">
          <div class="section-header">
            <div class="section-label">Today's log</div>
            <button class="clear-btn" id="clear-btn" style="display:none">Clear all</button>
          </div>
          <div id="log-list" class="log-list">
            <div class="empty-state">
              <div class="empty-icon">🍽</div>
              <p>No meals logged yet</p>
              <span>Pick a meal above to get started</span>
            </div>
          </div>
          <button class="save-log-btn" id="save-btn" style="display:none">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
            Save today's log
          </button>
        </section>
      </div>

      <!-- WEEK VIEW -->
      <div id="view-week" style="display:none">
        <section class="section">
          <div class="week-header">
            <button class="week-nav-btn" onclick="shiftWeek(-1)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg>
            </button>
            <span class="week-label" id="week-label"></span>
            <button class="week-nav-btn" onclick="shiftWeek(1)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>
            </button>
          </div>
          <div class="week-day-tabs" id="week-day-tabs"></div>
        </section>

        <section class="section week-day-section">
          <div id="week-slots"></div>
        </section>

        <div id="roommate-plans"></div>
      </div>

      <!-- HOUSEHOLD VIEW -->
      <div id="view-household" style="display:none">
        <div id="household-content"></div>
      </div>

    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-view="today" onclick="switchView('today')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
        <span>Today</span>
      </button>
      <button class="nav-btn" data-view="week" onclick="switchView('week')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Week</span>
      </button>
      <button class="nav-btn" data-view="household" onclick="switchView('household')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        <span>Household</span>
      </button>
    </nav>

    <!-- Week plan add-meal modal -->
    <div class="modal-overlay" id="week-modal-overlay" onclick="closeWeekModal()"></div>
    <div class="modal-sheet" id="week-modal">
      <div class="drawer-handle"></div>
      <div class="modal-title" id="week-modal-title">Add meal</div>
      <div class="select-wrap" style="margin-bottom:14px">
        <div class="select-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18M3 7h18M3 11h18M3 15h12M3 19h8"/></svg>
        </div>
        <button class="meal-select" id="week-meal-drop-btn" data-value="" onclick="toggleDropdown('week-meal-drop')">Choose a meal...</button>
        <div class="select-arrow">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6,9 12,15 18,9"/></svg>
        </div>
        <div class="custom-dropdown" id="week-meal-drop-list"></div>
      </div>
      <button class="save-log-btn" onclick="confirmAddToWeek()">Add to plan</button>
    </div>

    <!-- History Drawer -->
    <div class="drawer-overlay" id="drawer-overlay"></div>
    <div class="drawer" id="history-drawer">
      <div class="drawer-handle"></div>
      <div class="drawer-header">
        <h2 class="drawer-title">Meal history</h2>
        <button class="drawer-close" id="drawer-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="history-list" class="history-list"></div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="app.js"></script>
</body>
</html>
